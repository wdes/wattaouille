name: Build

on: [push, pull_request]

permissions:
    contents: read

env:
    GRCOV_VERSION: "0.10.5"
    RUST_VERSION: "1.95.0"

jobs:
    build:
        name: Build & test & lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
                  components: clippy, rustfmt, llvm-tools
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Build
              run: cargo build --locked --all-targets
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            - name: Run tests
              run: cargo test --locked --all-targets --no-fail-fast
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            - name: Check formatting
              run: cargo fmt -- --check
            - name: Clippy
              run: cargo clippy --all-targets --locked -- -D warnings
            - name: Install grcov
              run: |
                  mkdir -p "${HOME}/.local/bin"
                  curl -sL https://github.com/mozilla/grcov/releases/download/v${GRCOV_VERSION}/grcov-x86_64-unknown-linux-gnu.tar.bz2 | tar jxf - -C "${HOME}/.local/bin"
                  echo "$HOME/.local/bin" >> $GITHUB_PATH
            - name: Run grcov
              run: grcov . --binary-path target/debug/deps/ -s . -t lcov --branch --ignore-not-existing --ignore '../**' --ignore '/*' -o coverage.lcov
            - uses: codecov/codecov-action@v5
              with:
                  files: ./coverage.lcov
                  flags: rust
                  fail_ci_if_error: true
                  token: ${{ secrets.CODECOV_TOKEN }}
            - name: Build .deb package
              run: cargo install cargo-deb && cargo deb --locked
            - name: Upload .deb package
              uses: actions/upload-artifact@v7
              with:
                  name: wattaouille-deb
                  path: target/debian/*.deb
                  retention-days: 5
                  archive: false
            - name: Upload release binary
              uses: actions/upload-artifact@v7
              with:
                  name: wattaouille-linux-amd64
                  path: target/release/wattaouille
                  retention-days: 5
                  archive: false

    integration:
        name: Integration test (debian:trixie-slim)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/download-artifact@v7
              with:
                  name: wattaouille-linux-amd64
                  path: bin
            - uses: actions/download-artifact@v7
              with:
                  name: wattaouille-deb
                  path: deb
            - name: Mark binary as executable
              run: chmod +x bin/wattaouille
            - name: Run --check before installing .deb
              continue-on-error: true
              run: |
                  docker run --rm \
                      -v "$PWD/bin/wattaouille:/usr/local/bin/wattaouille:ro" \
                      -v /proc:/proc:ro \
                      -v /sys:/sys:ro \
                      debian:trixie-slim \
                      wattaouille --check
            - name: Install .deb and run --check
              run: |
                  docker run --rm \
                      -v "$PWD/deb:/debs:ro" \
                      -v /proc:/proc:ro \
                      -v /sys:/sys:ro \
                      debian:trixie-slim \
                      sh -c "apt-get update && apt-get install -y /debs/*.deb && wattaouille --check"
